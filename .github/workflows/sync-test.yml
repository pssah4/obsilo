name: Sync dev to test (strip devprocess/)

on:
  push:
    branches: [dev]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout obsilo/dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Strip devprocess/ and restore gitignore entry
        run: |
          # Remove devprocess/ from working tree and index
          git rm -r --cached devprocess/ 2>/dev/null || true
          rm -rf devprocess/

          # Add devprocess/ back to .gitignore for test/main branches
          echo "" >> .gitignore
          echo "# Dev process files — stripped by CI for test/main" >> .gitignore
          echo "devprocess/" >> .gitignore

          git add .gitignore

      - name: Commit filtered state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ! git diff --cached --quiet; then
            git commit -m "chore: strip devprocess/ for test branch"
          fi

      - name: Push to test branch
        run: |
          git push origin HEAD:test --force
