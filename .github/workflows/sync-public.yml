name: Sync to obsilo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout obsilo/main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Remove internal-only files
        run: |
          # Remove files that must not appear in the public repo
          git rm -rf --cached CLAUDE.md devprocess/ 2>/dev/null || true
          rm -rf CLAUDE.md devprocess/

      - name: Commit filtered state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove internal-only files for public release [skip ci]"
          fi

      - name: Push to obsilo
        env:
          TOKEN: ${{ secrets.OBSILO_PUBLIC_TOKEN }}
        run: |
          git remote add obsilo "https://x-access-token:${TOKEN}@github.com/pssah4/obsilo.git"
          git push obsilo HEAD:main --force
