name: Sync to obsilo (public)

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private/internal files
        run: |
          # Remove _private/ — must not appear in the public repo
          git rm -rf --cached _private/ 2>/dev/null || true
          rm -rf _private/

      - name: Commit filtered state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ! git diff --cached --quiet; then
            git commit -m "chore: strip internal files for public mirror [skip ci]"
          fi

      - name: Push to obsilo
        env:
          TOKEN: ${{ secrets.OBSILO_PUBLIC_TOKEN }}
        run: |
          git remote add obsilo "https://x-access-token:${TOKEN}@github.com/pssah4/obsilo.git"
          git push obsilo HEAD:main --force
